---
# Supporting organization
- name: Ensure organization ansibletestmirror exists
  infra.quay_configuration.quay_organization:
    name: ansibletestmirror
    email: ansibletestmirror@example.com
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

# Supporting robot account
- name: Ensure the robot account exist
  infra.quay_configuration.quay_robot:
    name: ansibletestmirror+ansibletestrobot
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: ERROR EXPECTED Missing required parameters
  infra.quay_configuration.quay_organization_mirror:
    organization: ansibletestmirror
    sync_interval: 43200
    sync_start_date: "2021-01-01T12:00:00Z"
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false
  ignore_errors: true
  register: result

- name: Ensure that the task failed
  ansible.builtin.assert:
    that: result['failed']
    fail_msg: The preceding task should have failed (missing parameters)

- name: ERROR EXPECTED Nonexisting organization
  infra.quay_configuration.quay_organization_mirror:
    organization: nonexisting
    external_registry_type: quay
    external_registry_url: https://quay.io
    external_namespace: projectquay
    robot_username: ansibletestmirror+ansibletestrobot
    visibility: public
    repository_filters:
      - quay
      - clair
      - redis
    sync_interval: 2d
    sync_start_date: "2026-04-20T13:00:00Z"
    is_enabled: true
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false
  ignore_errors: true
