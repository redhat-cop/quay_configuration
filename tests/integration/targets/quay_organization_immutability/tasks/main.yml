    behavior: matching_immutable
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: Ensure the immutability policy 3 is updated (2)
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "dev-.*"
    behavior: not_matching_immutable
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: Ensure the immutability policy 1 does not exists
