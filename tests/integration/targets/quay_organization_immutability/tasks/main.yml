---
- name: ERROR EXPECTED Ensure the immutability policy 1 exists
  infra.quay_configuration.quay_organization_immutability:
    namespace: orgdoesnotexist
    tag_pattern: "release-.*"
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false
  ignore_errors: true
  register: result

- name: Ensure that the task failed
  ansible.builtin.assert:
    that: result['failed']
    fail_msg: The preceding task should have failed (org does not exist)

- name: Ensure the immutability policy 1 exists
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "release-.*"
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: Ensure the immutability policy 1 exists (no change 1)
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "release-.*"
    behavior: matching_immutable
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false
  register: result

- name: Ensure that the task did not change anything
  ansible.builtin.assert:
    that: not result['changed']
    fail_msg: The preceding task should not have changed anything

- name: Ensure the immutability policy 1 exists (no change 2)
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "release-.*"
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false
  register: result

- name: Ensure that the task did not change anything
  ansible.builtin.assert:
    that: not result['changed']
    fail_msg: The preceding task should not have changed anything


- name: Ensure the immutability policy 2 exists
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "test-.*"
    behavior: not_matching_immutable
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: ERROR EXPECTED Ensure the immutability policy 1 is renamed
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "release-.*"
    new_tag_pattern: "test-.*"
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false
  ignore_errors: true
  register: result

- name: Ensure that the task failed
  ansible.builtin.assert:
    that: result['failed']
    fail_msg: The preceding task should have failed (duplicate policy)

- name: Ensure the immutability policy 1 is renamed and updated
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "release-.*"
    new_tag_pattern: "prod-.*"
    behavior: not_matching_immutable
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: Ensure the immutability policy 3 exists
  infra.quay_configuration.quay_organization_immutability:
    namespace: ansibletestorg
    tag_pattern: "foobar-.*"
    new_tag_pattern: "dev-.*"
    behavior: not_matching_immutable
    state: present
    quay_host: "{{ quay_url }}"
    quay_token: "{{ quay_token }}"
    validate_certs: false

- name: Ensure the immutability policy 3 is updated (1)
